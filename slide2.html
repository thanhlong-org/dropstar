<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FLOW Section</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Benne&family=Noto+Serif+JP:wght@200..900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Noto Serif JP", serif;
      background-color: #fff;
      overflow-x: hidden;
    }

    /* ==============================
       SECTION
    ============================== */
    .flow-section {
      position: relative;
      background: #fff;
    }

    /* ==============================
       HEADER
    ============================== */
    .flow-header {
      position: relative;
      padding: 50px 24px 0;
      overflow: hidden;
      z-index: 1;
    }

    .flow-cloud {
      position: absolute;
      border-radius: 50%;
      filter: blur(50px);
      pointer-events: none;
    }
    .flow-cloud--1 {
      width: 420px; height: 150px;
      background: rgba(160, 190, 230, 0.38);
      top: -30px; right: -40px;
    }
    .flow-cloud--2 {
      width: 280px; height: 90px;
      background: rgba(180, 210, 240, 0.28);
      top: 15px; left: 8%;
    }

    .flow-ttl {
      font-family: "Benne", serif;
      font-size: 52px;
      font-weight: 400;
      color: rgba(100, 120, 150, 0.50);
      line-height: 1;
    }

    .flow-sub {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 11px;
      font-weight: 300;
      color: rgba(80, 100, 130, 0.65);
      letter-spacing: 0.18em;
      margin-top: 6px;
    }
    .flow-sub::before,
    .flow-sub::after {
      content: "";
      flex: 1;
      max-width: 55px;
      height: 1px;
      background: rgba(80, 100, 130, 0.35);
    }

    /* ==============================
       CARD (dark navy / starfield)
    ============================== */
    .flow-card {
      position: relative;
      margin-top: 32px;
      margin-left: 16px;
      border-radius: 32px 0 0 0;
      background-color: #04111f;
      background-image:
        radial-gradient(ellipse 80% 60% at 50% 40%, rgba(18, 52, 108, 0.55) 0%, transparent 70%),
        url("assets/img/bg-company-img.png");
      background-size: cover;
      background-position: center;
      overflow: hidden;
      color: #fff;
      transition: opacity 0.25s;
    }

    .flow-card-inner {
      padding: 26px 24px 38px;
      transition: opacity 0.35s ease, transform 0.35s ease;
    }

    .flow-card-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .flow-card-head__icon {
      display: flex;
      align-items: center;
      color: #a8c8e8;
    }

    .flow-card-head__num {
      font-family: "Benne", serif;
      font-size: 22px;
      color: #fff;
      letter-spacing: 0.05em;
    }

    .flow-card-head__ttl {
      font-size: 18px;
      font-weight: 500;
      color: #fff;
      letter-spacing: 0.08em;
    }

    /* Image + arrows */
    .flow-card-img-wrap {
      position: relative;
    }

    .flow-card-img {
      width: 100%;
      max-width: 440px;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      display: block;
      border-radius: 4px;
    }

    .flow-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 26px;
      height: 34px;
      background: linear-gradient(180deg, #3897C2 0%, #2a6a99 100%);
      border: none;
      cursor: pointer;
      z-index: 10;
      transition: opacity 0.2s;
    }
    .flow-arrow:active { opacity: 0.55; }
    .flow-arrow--prev {
      left: 0;
      clip-path: polygon(100% 0%, 0% 50%, 100% 100%);
    }
    .flow-arrow--next {
      right: 0;
      clip-path: polygon(0% 0%, 100% 50%, 0% 100%);
    }

    .flow-card-desc {
      margin-top: 24px;
      text-align: center;
    }
    .flow-card-desc p {
      font-size: 14px;
      font-weight: 300;
      line-height: 2.2;
      color: rgba(255, 255, 255, 0.88);
    }

    .flow-cta {
      display: block;
      width: fit-content;
      margin: 28px auto 0;
      padding: 14px 48px;
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: 50px;
      color: #fff;
      text-decoration: none;
      font-size: 14px;
      font-weight: 300;
      background: rgba(0, 0, 0, 0.15);
      letter-spacing: 0.08em;
      white-space: nowrap;
      transition: background 0.25s;
    }
    .flow-cta:hover { background: rgba(255,255,255,0.1); }

    /* ==============================
       MOBILE BOTTOM NAV
    ============================== */
    .flow-sp-nav {
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 16px 8px 20px;
      background: #fff;
    }

    .flow-sp-dot {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      transition: all 0.25s;
      font-family: "Noto Serif JP", serif;
    }

    .flow-dot-circle {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(40, 60, 110, 0.3);
      background: transparent;
      transition: all 0.25s;
    }

    .flow-sp-dot.active .flow-dot-circle {
      background: rgba(130, 165, 210, 0.28);
      color: rgba(40, 60, 110, 0.8);
    }

    .flow-dot-num {
      font-size: 10px;
      letter-spacing: 0.05em;
      color: rgba(40, 60, 110, 0.38);
    }
    .flow-sp-dot.active .flow-dot-num {
      color: rgba(40, 60, 110, 0.85);
    }

    /* hide PC on mobile */
    .flow-pc  { display: none; }
    .flow-sp-wrap { display: block; }

    /* ==============================
       PC  >=768px
    ============================== */
    @media (min-width: 768px) {
      .flow-sp-wrap { display: none; }
      .flow-pc      { display: block; }

      .flow-header { padding: 60px 60px 0; }
      .flow-ttl    { font-size: 80px; }

      .flow-cloud--1 {
        width: 700px; height: 200px;
        top: -50px; right: -80px;
      }

      .flow-pc-layout {
        display: flex;
        align-items: flex-start;
        margin-top: 44px;
      }

      /* Sidebar */
      .flow-pc-sidebar {
        flex-shrink: 0;
        width: 160px;
        padding: 44px 0 44px 60px;
        display: flex;
        flex-direction: column;
        gap: 30px;
      }

      .flow-pc-nav-item {
        display: flex;
        align-items: center;
        gap: 12px;
        cursor: pointer;
        transition: opacity 0.2s;
      }
      .flow-pc-nav-item:not(.active) { opacity: 0.38; }
      .flow-pc-nav-item:not(.active):hover { opacity: 0.7; }

      .flow-pc-nav-icon {
        width: 46px;
        height: 46px;
        border-radius: 50%;
        background: rgba(130, 165, 210, 0.18);
        display: flex;
        align-items: center;
        justify-content: center;
        color: rgba(40, 60, 110, 0.5);
        flex-shrink: 0;
        transition: all 0.25s;
      }
      .flow-pc-nav-item.active .flow-pc-nav-icon {
        background: #c85820;
        color: #fff;
      }

      .flow-pc-nav-num {
        font-family: "Benne", serif;
        font-size: 16px;
        color: rgba(40, 60, 110, 0.7);
      }

      /* PC Card */
      .flow-pc-card {
        flex: 1;
        border-radius: 36px 0 0 0;
        background-color: #04111f;
        background-image:
          radial-gradient(ellipse 80% 60% at 40% 40%, rgba(18, 52, 108, 0.55) 0%, transparent 70%),
          url("assets/img/bg-company-img.png");
        background-size: cover;
        background-position: center;
        overflow: hidden;
        color: #fff;
        min-height: 380px;
        transition: opacity 0.25s;
      }

      .flow-pc-card-inner {
        padding: 42px 60px 52px 50px;
        transition: opacity 0.35s ease, transform 0.35s ease;
      }

      .flow-pc-card-head {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 32px;
      }

      .flow-pc-card-head__icon {
        display: flex;
        align-items: center;
        color: #a8c8e8;
      }

      .flow-pc-card-head__num {
        font-family: "Benne", serif;
        font-size: 28px;
        color: #fff;
        letter-spacing: 0.05em;
      }

      .flow-pc-card-head__ttl {
        font-size: 22px;
        font-weight: 500;
        color: #fff;
        letter-spacing: 0.1em;
      }

      .flow-pc-card-body {
        display: flex;
        gap: 50px;
        align-items: flex-start;
      }

      .flow-pc-card-img {
        width: 340px;
        flex-shrink: 0;
        aspect-ratio: 4 / 3;
        object-fit: cover;
        border-radius: 4px;
        display: block;
      }

      .flow-pc-card-text {
        flex: 1;
        padding-top: 10px;
      }

      .flow-pc-card-text p {
        font-size: 15px;
        font-weight: 300;
        line-height: 2.4;
        color: rgba(255, 255, 255, 0.85);
        text-align: center;
      }

      .flow-pc-cta {
        display: block;
        width: fit-content;
        margin: 32px auto 0;
        padding: 14px 44px;
        border: 1px solid rgba(255, 255, 255, 0.6);
        border-radius: 50px;
        color: #fff;
        text-decoration: none;
        font-size: 14px;
        font-weight: 300;
        background: rgba(0, 0, 0, 0.15);
        letter-spacing: 0.08em;
        white-space: nowrap;
        transition: background 0.25s;
      }
      .flow-pc-cta:hover { background: rgba(255,255,255,0.1); }
    }
  </style>
</head>
<body>

<section class="flow-section" id="flow">

  <!-- HEADER -->
  <div class="flow-header">
    <span class="flow-cloud flow-cloud--1"></span>
    <span class="flow-cloud flow-cloud--2"></span>
    <h2 class="flow-ttl">FLOW</h2>
    <p class="flow-sub">ご相談の流れ</p>
  </div>

  <!-- ============================================================
       MOBILE
  ============================================================ -->
  <div class="flow-sp-wrap">

    <div class="flow-card" id="flow-sp-card">
      <div class="flow-card-inner">

        <div class="flow-card-head">
          <span class="flow-card-head__icon">
            <svg width="22" height="22" viewBox="0 0 32 34" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
              <path d="M16 1C16 1 18 13 23.5 16C18 19.5 16 31 16 31C16 31 14 19.5 8.5 16C14 13 16 1 16 1Z"/>
              <path d="M1 16C1 16 13 18 16 23.5C19 18 31 16 31 16C31 16 19 14 16 8.5C13 14 1 16 1 16Z"/>
            </svg>
          </span>
          <span class="flow-card-head__num" id="sp-num">01</span>
          <h3 class="flow-card-head__ttl" id="sp-ttl">お問い合わせ</h3>
        </div>

        <div class="flow-card-img-wrap">
          <img class="flow-card-img" id="sp-img"
               src="assets/img/business-img01.png" alt="お問い合わせ">
          <!-- ← prev: hidden by default, appears only on slide 6 -->
          <button class="flow-arrow flow-arrow--prev" id="sp-prev" aria-label="前へ"></button>
          <!-- → next: visible on slides 1–5 -->
          <button class="flow-arrow flow-arrow--next" id="sp-next" aria-label="次へ"></button>
        </div>

        <div class="flow-card-desc" id="sp-desc">
          <p>まずはお気軽にご相談ください</p>
          <p>現状の課題やお悩みをヒアリングし、</p>
          <p>最適な支援方法を検討します。</p>
        </div>

        <a href="#" class="flow-cta">今すぐ相談する　→</a>

      </div>
    </div>

    <!-- Bottom dot nav -->
    <nav class="flow-sp-nav" id="sp-nav">
      <button class="flow-sp-dot active" data-index="0">
        <div class="flow-dot-circle"><svg width="20" height="20" viewBox="0 0 32 34" fill="currentColor"><path d="M16 1C16 1 18 13 23.5 16C18 19.5 16 31 16 31C16 31 14 19.5 8.5 16C14 13 16 1 16 1Z"/><path d="M1 16C1 16 13 18 16 23.5C19 18 31 16 31 16C31 16 19 14 16 8.5C13 14 1 16 1 16Z"/></svg></div>
        <span class="flow-dot-num">01</span>
      </button>
      <button class="flow-sp-dot" data-index="1">
        <div class="flow-dot-circle"><svg width="20" height="20" viewBox="0 0 32 34" fill="currentColor"><path d="M16 1C16 1 18 13 23.5 16C18 19.5 16 31 16 31C16 31 14 19.5 8.5 16C14 13 16 1 16 1Z"/><path d="M1 16C1 16 13 18 16 23.5C19 18 31 16 31 16C31 16 19 14 16 8.5C13 14 1 16 1 16Z"/></svg></div>
        <span class="flow-dot-num">02</span>
      </button>
      <button class="flow-sp-dot" data-index="2">
        <div class="flow-dot-circle"><svg width="20" height="20" viewBox="0 0 32 34" fill="currentColor"><path d="M16 1C16 1 18 13 23.5 16C18 19.5 16 31 16 31C16 31 14 19.5 8.5 16C14 13 16 1 16 1Z"/><path d="M1 16C1 16 13 18 16 23.5C19 18 31 16 31 16C31 16 19 14 16 8.5C13 14 1 16 1 16Z"/></svg></div>
        <span class="flow-dot-num">03</span>
      </button>
      <button class="flow-sp-dot" data-index="3">
        <div class="flow-dot-circle"><svg width="20" height="20" viewBox="0 0 32 34" fill="currentColor"><path d="M16 1C16 1 18 13 23.5 16C18 19.5 16 31 16 31C16 31 14 19.5 8.5 16C14 13 16 1 16 1Z"/><path d="M1 16C1 16 13 18 16 23.5C19 18 31 16 31 16C31 16 19 14 16 8.5C13 14 1 16 1 16Z"/></svg></div>
        <span class="flow-dot-num">04</span>
      </button>
      <button class="flow-sp-dot" data-index="4">
        <div class="flow-dot-circle"><svg width="20" height="20" viewBox="0 0 32 34" fill="currentColor"><path d="M16 1C16 1 18 13 23.5 16C18 19.5 16 31 16 31C16 31 14 19.5 8.5 16C14 13 16 1 16 1Z"/><path d="M1 16C1 16 13 18 16 23.5C19 18 31 16 31 16C31 16 19 14 16 8.5C13 14 1 16 1 16Z"/></svg></div>
        <span class="flow-dot-num">05</span>
      </button>
      <button class="flow-sp-dot" data-index="5">
        <div class="flow-dot-circle"><svg width="20" height="20" viewBox="0 0 32 34" fill="currentColor"><path d="M16 1C16 1 18 13 23.5 16C18 19.5 16 31 16 31C16 31 14 19.5 8.5 16C14 13 16 1 16 1Z"/><path d="M1 16C1 16 13 18 16 23.5C19 18 31 16 31 16C31 16 19 14 16 8.5C13 14 1 16 1 16Z"/></svg></div>
        <span class="flow-dot-num">06</span>
      </button>
    </nav>

  </div>

  <!-- ============================================================
       PC
  ============================================================ -->
  <div class="flow-pc">
    <div class="flow-pc-layout">

      <aside class="flow-pc-sidebar" id="pc-sidebar">
        <div class="flow-pc-nav-item active" data-index="0">
          <div class="flow-pc-nav-icon"><svg width="22" height="22" viewBox="0 0 32 34" fill="currentColor"><path d="M16 1C16 1 18 13 23.5 16C18 19.5 16 31 16 31C16 31 14 19.5 8.5 16C14 13 16 1 16 1Z"/><path d="M1 16C1 16 13 18 16 23.5C19 18 31 16 31 16C31 16 19 14 16 8.5C13 14 1 16 1 16Z"/></svg></div>
          <span class="flow-pc-nav-num">01</span>
        </div>
        <div class="flow-pc-nav-item" data-index="1">
          <div class="flow-pc-nav-icon"><svg width="22" height="22" viewBox="0 0 32 34" fill="currentColor"><path d="M16 1C16 1 18 13 23.5 16C18 19.5 16 31 16 31C16 31 14 19.5 8.5 16C14 13 16 1 16 1Z"/><path d="M1 16C1 16 13 18 16 23.5C19 18 31 16 31 16C31 16 19 14 16 8.5C13 14 1 16 1 16Z"/></svg></div>
          <span class="flow-pc-nav-num">02</span>
        </div>
        <div class="flow-pc-nav-item" data-index="2">
          <div class="flow-pc-nav-icon"><svg width="22" height="22" viewBox="0 0 32 34" fill="currentColor"><path d="M16 1C16 1 18 13 23.5 16C18 19.5 16 31 16 31C16 31 14 19.5 8.5 16C14 13 16 1 16 1Z"/><path d="M1 16C1 16 13 18 16 23.5C19 18 31 16 31 16C31 16 19 14 16 8.5C13 14 1 16 1 16Z"/></svg></div>
          <span class="flow-pc-nav-num">03</span>
        </div>
        <div class="flow-pc-nav-item" data-index="3">
          <div class="flow-pc-nav-icon"><svg width="22" height="22" viewBox="0 0 32 34" fill="currentColor"><path d="M16 1C16 1 18 13 23.5 16C18 19.5 16 31 16 31C16 31 14 19.5 8.5 16C14 13 16 1 16 1Z"/><path d="M1 16C1 16 13 18 16 23.5C19 18 31 16 31 16C31 16 19 14 16 8.5C13 14 1 16 1 16Z"/></svg></div>
          <span class="flow-pc-nav-num">04</span>
        </div>
        <div class="flow-pc-nav-item" data-index="4">
          <div class="flow-pc-nav-icon"><svg width="22" height="22" viewBox="0 0 32 34" fill="currentColor"><path d="M16 1C16 1 18 13 23.5 16C18 19.5 16 31 16 31C16 31 14 19.5 8.5 16C14 13 16 1 16 1Z"/><path d="M1 16C1 16 13 18 16 23.5C19 18 31 16 31 16C31 16 19 14 16 8.5C13 14 1 16 1 16Z"/></svg></div>
          <span class="flow-pc-nav-num">05</span>
        </div>
        <div class="flow-pc-nav-item" data-index="5">
          <div class="flow-pc-nav-icon"><svg width="22" height="22" viewBox="0 0 32 34" fill="currentColor"><path d="M16 1C16 1 18 13 23.5 16C18 19.5 16 31 16 31C16 31 14 19.5 8.5 16C14 13 16 1 16 1Z"/><path d="M1 16C1 16 13 18 16 23.5C19 18 31 16 31 16C31 16 19 14 16 8.5C13 14 1 16 1 16Z"/></svg></div>
          <span class="flow-pc-nav-num">06</span>
        </div>
      </aside>

      <div class="flow-pc-card" id="flow-pc-card">
        <div class="flow-pc-card-inner">
          <div class="flow-pc-card-head">
            <span class="flow-pc-card-head__icon">
              <svg width="28" height="28" viewBox="0 0 32 34" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                <path d="M16 1C16 1 18 13 23.5 16C18 19.5 16 31 16 31C16 31 14 19.5 8.5 16C14 13 16 1 16 1Z"/>
                <path d="M1 16C1 16 13 18 16 23.5C19 18 31 16 31 16C31 16 19 14 16 8.5C13 14 1 16 1 16Z"/>
              </svg>
            </span>
            <span class="flow-pc-card-head__num" id="pc-num">01</span>
            <h3 class="flow-pc-card-head__ttl" id="pc-ttl">お問い合わせ</h3>
          </div>
          <div class="flow-pc-card-body">
            <img class="flow-pc-card-img" id="pc-img"
                 src="assets/img/business-img01.png" alt="お問い合わせ">
            <div class="flow-pc-card-text" id="pc-text">
              <p>まずはお気軽にご相談ください。<br>現状の課題やお悩みをヒアリングし、<br>最適な支援方法を検討します。</p>
              <a href="#" class="flow-pc-cta">今すぐ相談する　→</a>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

</section>

<script>
  const FLOW_DATA = [
    {
      num: '01', title: 'お問い合わせ',
      img: 'assets/img/business-img01.png',
      desc: 'まずはお気軽にご相談ください\n現状の課題やお悩みをヒアリングし、\n最適な支援方法を検討します。'
    },
    {
      num: '02', title: 'ヒアリング',
      img: 'assets/img/business-img02.png',
      desc: '詳しいヒアリングを行い、\n課題の本質を丁寧に整理します。\n何でもお話しください。'
    },
    {
      num: '03', title: '課題整理・分析',
      img: 'assets/img/business-img03.png',
      desc: '現状を分析し、優先すべき課題を\n明確にします。的確な診断で\n本質に迫ります。'
    },
    {
      num: '04', title: 'ご提案',
      img: 'assets/img/business-img04.png',
      desc: '課題解決のための最適なプランを\nご提案いたします。貴社に合わせた\nオーダーメイドの支援策です。'
    },
    {
      num: '05', title: '実行・伴走支援',
      img: 'assets/img/business-img05.png',
      desc: '提案したプランの実行を\n伴走支援します。\n現場に寄り添い、共に進めます。'
    },
    {
      num: '06', title: 'フォローアップ',
      img: 'assets/img/business-img06.png',
      desc: '継続的にフォローし、成果を確認。\n状況の変化にも柔軟に対応し、\n長期的なサポートを提供します。'
    }
  ];

  /* ----- MOBILE ----- */
  let spIdx = 0;
  const spCard  = document.getElementById('flow-sp-card');
  const spInner = spCard.querySelector('.flow-card-inner');
  const spNum   = document.getElementById('sp-num');
  const spTtl   = document.getElementById('sp-ttl');
  const spImg   = document.getElementById('sp-img');
  const spDesc  = document.getElementById('sp-desc');
  const spPrev  = document.getElementById('sp-prev');
  const spNext  = document.getElementById('sp-next');
  const spDots  = document.querySelectorAll('#sp-nav .flow-sp-dot');

  function spGoTo(idx) {
    // fade out + slide up
    spInner.style.opacity   = '0';
    spInner.style.transform = 'translateY(-12px)';

    setTimeout(() => {
      spIdx = ((idx % FLOW_DATA.length) + FLOW_DATA.length) % FLOW_DATA.length;
      const d = FLOW_DATA[spIdx];
      spNum.textContent = d.num;
      spTtl.textContent = d.title;
      spImg.src         = d.img;
      spImg.alt         = d.title;
      spDesc.innerHTML  = d.desc.split('\n').map(l => `<p>${l}</p>`).join('');
      spDots.forEach((dot, i) => dot.classList.toggle('active', i === spIdx));

      // reset position below, then fade in + slide up into place
      spInner.style.transition = 'none';
      spInner.style.transform  = 'translateY(16px)';

      requestAnimationFrame(() => requestAnimationFrame(() => {
        spInner.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
        spInner.style.opacity    = '1';
        spInner.style.transform  = 'translateY(0)';
      }));
    }, 280);
  }

  spPrev.addEventListener('click', () => spGoTo(spIdx - 1));
  spNext.addEventListener('click', () => spGoTo(spIdx + 1));
  spDots.forEach(dot => dot.addEventListener('click', () => spGoTo(+dot.dataset.index)));

  /* ----- PC ----- */
  let pcIdx = 0;
  const pcCard     = document.getElementById('flow-pc-card');
  const pcInner    = pcCard.querySelector('.flow-pc-card-inner');
  const pcNum      = document.getElementById('pc-num');
  const pcTtl      = document.getElementById('pc-ttl');
  const pcImg      = document.getElementById('pc-img');
  const pcText     = document.getElementById('pc-text');
  const pcNavItems = document.querySelectorAll('#pc-sidebar .flow-pc-nav-item');

  function pcGoTo(idx) {
    pcInner.style.opacity   = '0';
    pcInner.style.transform = 'translateY(-10px)';

    setTimeout(() => {
      pcIdx = idx;
      const d = FLOW_DATA[pcIdx];
      pcNum.textContent = d.num;
      pcTtl.textContent = d.title;
      pcImg.src         = d.img;
      pcImg.alt         = d.title;
      pcText.innerHTML  =
        `<p>${d.desc.replace(/\n/g, '<br>')}</p>
         <a href="#" class="flow-pc-cta">今すぐ相談する　→</a>`;
      pcNavItems.forEach((item, i) => item.classList.toggle('active', i === pcIdx));

      pcInner.style.transition = 'none';
      pcInner.style.transform  = 'translateY(14px)';

      requestAnimationFrame(() => requestAnimationFrame(() => {
        pcInner.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
        pcInner.style.opacity    = '1';
        pcInner.style.transform  = 'translateY(0)';
      }));
    }, 260);
  }

  pcNavItems.forEach(item => item.addEventListener('click', () => pcGoTo(+item.dataset.index)));
</script>

</body>
</html>
